swagger: '2.0'
info:
    title: Argent Bank Transactions API
    description: API endpoints for transaction management
    version: '1.0.0'
    termsOfService: 'http://swagger.io/terms/'
host: localhost:3001
basePath: /api/v1
schemes:
    - http
securityDefinitions:
    Bearer:
        type: apiKey
        name: Authorization
        in: header
paths:
    /user/transactions:
        get:
            security:
                - Bearer: []
            tags:
                - Transaction Module
            summary: Get all transactions
            description: Get all transactions for the current month grouped by account
            parameters:
                - in: header
                  name: Authorization
                  description: Attach Bearer JWT token
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                '200':
                    description: Transactions retrieved successfully
                    schema:
                        $ref: '#/definitions/TransactionsResponse'
                '401':
                    description: Unauthorized
                '500':
                    description: Internal Server Error

    /user/transactions/{transactionId}:
        get:
            security:
                - Bearer: []
            tags:
                - Transaction Module
            summary: Get transaction details
            description: Get details of a specific transaction
            parameters:
                - in: header
                  name: Authorization
                  description: Attach Bearer JWT token
                  required: true
                  type: string
                - in: path
                  name: transactionId
                  description: Transaction ID
                  required: true
                  type: string
            produces:
                - application/json
            responses:
                '200':
                    description: Transaction retrieved successfully
                    schema:
                        $ref: '#/definitions/TransactionDetailResponse'
                '401':
                    description: Unauthorized
                '404':
                    description: Transaction not found
                '500':
                    description: Internal Server Error
        put:
            security:
                - Bearer: []
            tags:
                - Transaction Module
            summary: Modify a note to a transaction
            description: Modify a note to a specific transaction
            parameters:
                - in: header
                  name: Authorization
                  description: Attach Bearer JWT token
                  required: true
                  type: string
                - in: path
                  name: transactionId
                  description: Transaction ID
                  required: true
                  type: string
                - in: body
                  name: body
                  description: Note payload
                  required: true
                  schema:
                      $ref: '#/definitions/TransactionUpdatePayload'
            produces:
                - application/json
            responses:
                '200':
                    description: Note added successfully
                    schema:
                        $ref: '#/definitions/TransactionUpdatePayload'
                '400':
                    description: Invalid Fields
                '401':
                    description: Unauthorized
                '404':
                    description: Transaction not found
                '500':
                    description: Internal Server Error

definitions:
    TransactionBasic:
        type: object
        properties:
            id:
                type: string
                description: Transaction ID
            accountId:
                type: string
                description: Account ID the transaction belongs to
            date:
                type: string
                description: Transaction date
            description:
                type: string
                description: Transaction description
            amount:
                type: number
                description: Transaction amount
            balance:
                type: number
                description: Account balance after transaction

    Transaction:
        type: object
        properties:
            id:
                type: string
                description: Transaction ID
            accountId:
                type: string
                description: Account ID the transaction belongs to
            date:
                type: string
                description: Transaction date
            description:
                type: string
                description: Transaction description
            amount:
                type: number
                description: Transaction amount
            balance:
                type: number
                description: Account balance after transaction
            type:
                type: string
                description: Transaction type
            category:
                type: string
                description: Transaction category
            notes:
                type: string
                description: User notes on the transaction

    TransactionsResponse:
        type: object
        properties:
            status:
                type: integer
            message:
                type: string
            body:
                type: array
                items:
                    $ref: '#/definitions/TransactionBasic'

    TransactionDetailResponse:
        type: object
        properties:
            status:
                type: integer
            message:
                type: string
            body:
                $ref: '#/definitions/Transaction'

    TransactionUpdatePayload:
        type: object
        properties:
            category:
                type: string
                description: Transaction category
            notes:
                type: string
                description: User notes on the transaction
